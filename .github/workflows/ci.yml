name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KONSISTENT_NO_UPDATE_CHECK: 'true'

    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: 'pnpm install --frozen-lockfile'

      - name: Run typecheck
        run: 'pnpm run typecheck'

      - name: Run lint
        run: 'pnpm run lint'

      - name: Run dead-code checks
        run: 'pnpm run deadcode'

      - name: Validate konsistent config
        run: 'pnpm run konsistent:validate'

      - name: Run structural consistency checks
        run: 'pnpm run konsistent'

      - name: Run build
        run: 'pnpm run build'

      - name: Run full tests
        run: 'pnpm test'

      - name: Run parity type checks
        run: 'pnpm run typecheck:parity'

      - name: Run parity tests
        run: 'pnpm run test:parity'
