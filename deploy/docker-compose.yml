services:
  postgres:
    image: postgres:17
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB:-n8n}", "-U", "${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 45s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: ${N8N_IMAGE_REF:-ghcr.io/example-owner/n8n-claude-sdk:v0.2.22}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/claude-user/.n8n
      - claude-config:/home/claude-user/.claude
      - projects:/home/claude-user/projects
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      WEBHOOK_URL: https://${DOMAIN}
      N8N_PROTOCOL: https
      N8N_CUSTOM_EXTENSIONS: /opt/n8n-custom-nodes/node_modules
      SHELL: /bin/bash
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_CODE_EXECUTABLE_PATH: /usr/local/share/npm-global/bin/claude
      HOME: /home/claude-user
      NODE_ENV: production
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: ${RUNNERS_AUTH_TOKEN}
      N8N_CONCURRENCY_PRODUCTION_LIMIT: ${N8N_CONCURRENCY_PRODUCTION_LIMIT:-5}
      N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  n8n-worker:
    image: ${N8N_IMAGE_REF:-ghcr.io/example-owner/n8n-claude-sdk:v0.2.22}
    command: ["worker", "--concurrency=5"]
    volumes:
      - n8n-data:/home/claude-user/.n8n
      - claude-config:/home/claude-user/.claude
      - projects:/home/claude-user/projects
    environment:
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_CUSTOM_EXTENSIONS: /opt/n8n-custom-nodes/node_modules
      SHELL: /bin/bash
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_CODE_EXECUTABLE_PATH: /usr/local/share/npm-global/bin/claude
      HOME: /home/claude-user
      NODE_ENV: production
      N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      n8n:
        condition: service_healthy
    restart: unless-stopped

  task-runners:
    image: ${RUNNERS_IMAGE_REF:-ghcr.io/example-owner/n8n-claude-sdk-runners:v0.2.22}
    volumes:
      - claude-config:/home/runner/.claude
    environment:
      N8N_RUNNERS_AUTH_TOKEN: ${RUNNERS_AUTH_TOKEN}
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - n8n
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - n8n
    restart: unless-stopped

  # ── Tailscale sidecars ───────────────────────────────────────────────────
  # Each sidecar joins the tailnet and serves its paired app over HTTPS.
  # TS_AUTHKEY must be reusable (not one-time) since three containers share it.

  tailscale-files:
    image: tailscale/tailscale:latest
    hostname: files-n8n
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-files-state:/var/lib/tailscale
      - ./ts-files-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  tailscale-code:
    profiles: ["devtools"]
    image: tailscale/tailscale:latest
    hostname: code-n8n
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-code-state:/var/lib/tailscale
      - ./ts-code-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  # ── File Manager ─────────────────────────────────────────────────────────
  # Served privately via Tailscale at https://files-n8n.<tailnet>.ts.net

  filebrowser:
    image: filebrowser/filebrowser:latest
    network_mode: service:tailscale-files
    user: "0:0"
    volumes:
      - n8n-data:/srv/n8n-data
      - claude-config:/srv/claude-config
      - projects:/srv/projects
      - ${STACK_CONFIG_PATH:-.}:/srv/stack-config
      - filebrowser-db:/database
    environment:
      FB_DATABASE: /database/filebrowser.db
      FB_ROOT: /srv
      FB_PORT: "8080"
    depends_on:
      - tailscale-files
    restart: unless-stopped

  # ── VS Code (code-server) ────────────────────────────────────────────────
  # Served privately via Tailscale at https://code-n8n.<tailnet>.ts.net
  #
  # Start it with:
  #   docker compose --profile devtools up -d

  code-server:
    profiles: ["devtools"]
    image: ${CODE_SERVER_IMAGE_REF:-ghcr.io/example-owner/n8n-claude-sdk-code-server:v0.2.22}
    network_mode: service:tailscale-code
    volumes:
      - code-server-config:/config
      # Mirror FileBrowser mounts so you edit the same data.
      - n8n-data:/config/workspace/n8n-data
      - claude-config:/config/workspace/claude-config
      - projects:/config/workspace/projects
      - ${STACK_CONFIG_PATH:-.}:/config/workspace/stack-config:ro
    environment:
      PUID: "1001"
      PGID: "1001"
      TZ: ${TZ:-Etc/UTC}
      DEFAULT_WORKSPACE: /config/workspace/projects
      # If PASSWORD/HASHED_PASSWORD are not set, there will be no auth.
      # Prefer HASHED_PASSWORD over PASSWORD.
      PASSWORD: ${CODE_SERVER_PASSWORD:-}
      HASHED_PASSWORD: ${CODE_SERVER_HASHED_PASSWORD:-}
    depends_on:
      - tailscale-code
      - n8n
    restart: unless-stopped

  # ── Monitoring ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  n8n-data:
  claude-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/n8n-claude-session-data
  projects:
  caddy-data:
  caddy-config:
  filebrowser-db:
  code-server-config:
  tailscale-files-state:
  tailscale-code-state:
  prometheus-data:
  grafana-data:
